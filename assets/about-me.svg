<svg xmlns="http://www.w3.org/2000/svg" width="550" height="280" viewBox="0 0 550 280">
  <defs>
    <pattern id="scan-a" width="550" height="4" patternUnits="userSpaceOnUse">
      <rect width="550" height="1" fill="#ffffff" opacity="0.02"/>
    </pattern>
  </defs>

  <!-- Terminal Window -->
  <rect width="550" height="280" rx="8" fill="#0a0a0a" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Title Bar -->
  <rect width="550" height="34" rx="8" fill="#141414"/>
  <rect y="26" width="550" height="8" fill="#141414"/>
  <line x1="0" y1="34" x2="550" y2="34" stroke="#1e1e1e" stroke-width="0.5"/>

  <!-- Window Dots -->
  <circle cx="16" cy="17" r="4.5" fill="#333"/>
  <circle cx="33" cy="17" r="4.5" fill="#2a2a2a"/>
  <circle cx="50" cy="17" r="4.5" fill="#222"/>

  <!-- Title -->
  <text x="275" y="21" text-anchor="middle" font-family="'Courier New', Consolas, monospace" font-size="12" fill="#555">readme.txt</text>

  <!-- Scanlines -->
  <rect y="34" width="550" height="246" fill="url(#scan-a)"/>

  <!-- Command -->
  <text x="20" y="60" font-family="'Courier New', Consolas, monospace" font-size="14" fill="#0cce2dff">$</text>
  <text x="34" y="60" font-family="'Courier New', Consolas, monospace" font-size="14" fill="#ccccccff"> cat readme.txt</text>

  <!-- Divider top -->
  <text x="16" y="76" font-family="'Courier New', monospace" font-size="13" fill="#3a3a3a">+----------------------------------------------------------+</text>
 
  <!-- name -->
  <text x="16" y="96" font-family="'Courier New', monospace" font-size="13" fill="#555">|  </text>
  <text x="43" y="96" font-family="'Courier New', monospace" font-size="13" fill="#888">me name hanif </text>
 
  <!-- games -->
  <text x="16" y="116" font-family="'Courier New', monospace" font-size="13" fill="#555">|  </text>
  <text x="43" y="116" font-family="'Courier New', monospace" font-size="13" fill="#888">sweaty hok gamer | retired osu gamer | competitive val enjoyer</text>
 
  <!-- fesnuk -->
  <text x="16" y="136" font-family="'Courier New', monospace" font-size="13" fill="#555">|  </text>
  <text x="43" y="136" font-family="'Courier New', monospace" font-size="13" fill="#888">always scroll fesnuk</text>
 
  <!-- anime -->
  <text x="16" y="156" font-family="'Courier New', monospace" font-size="13" fill="#555">|  </text>
  <text x="43" y="156" font-family="'Courier New', monospace" font-size="13" fill="#888">my top anime : monster, claymore, hack//gu</text>
 
  <!-- vim -->
  <text x="16" y="176" font-family="'Courier New', monospace" font-size="13" fill="#555">|  </text>
  <text x="43" y="176" font-family="'Courier New', monospace" font-size="13" fill="#c8a000" font-style="italic">i use vim btw</text>
 
  <!-- leetcode -->
  <text x="16" y="196" font-family="'Courier New', monospace" font-size="13" fill="#555">|  </text>
  <text x="43" y="196" font-family="'Courier New', monospace" font-size="13" fill="#888">still grinding leetcode for boasting</text>
 
  <!-- contact -->
  <text x="16" y="216" font-family="'Courier New', monospace" font-size="13" fill="#555">|  </text>
  <text x="43" y="216" font-family="'Courier New', monospace" font-size="13" fill="#888">telegram </text>
  <text x="110" y="216" font-family="'Courier New', monospace" font-size="13" fill="#4a9eff">@hanifsetyananda</text>
 
  <!-- Divider bottom -->
  <text x="16" y="236" font-family="'Courier New', monospace" font-size="13" fill="#3a3a3a">+----------------------------------------------------------+</text>
 

  <!-- Cursor -->
  <text x="20" y="258" font-family="'Courier New', Consolas, monospace" font-size="14" fill="#0cce2dff">$</text>
  <rect x="34" y="246" width="8" height="14" fill="#0cce2dff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
